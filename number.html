<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Number Guessing Game</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

:root{
    --bg:#05010f;
    --pink:#ff2fd0;
    --purple:#7b2fff;
    --blue:#2fb8ff;
    --green:#22c55e;
    --yellow:#facc15;
    --orange:#f97316;
    --red:#ef4444;
    --text:#ffffff;
    --muted:#cbd5e1;
    --glass:rgba(255,255,255,0.06);
    --glass-border:rgba(255,255,255,0.12);
    --radius-lg:24px;
    --font-display:'Sora','Segoe UI',sans-serif;
    --font-body:'Segoe UI',system-ui,sans-serif;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:var(--font-body);
    -webkit-tap-highlight-color:transparent;
}

html{
    -webkit-text-size-adjust:100%;
}

body{
    min-height:100vh;
    min-height:100dvh;
    background:var(--bg);
    color:var(--text);
    position:relative;
    overflow-x:hidden;
}

/* animated aurora background */

.aurora{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
    pointer-events:none;
}

.aurora::before,
.aurora::after{
    content:"";
    position:absolute;
    width:min(600px,80vw);
    height:min(600px,80vw);
    border-radius:50%;
    filter:blur(120px);
    opacity:.45;
    animation:drift 12s ease-in-out infinite alternate;
}

.aurora::before{
    background:var(--pink);
    top:-150px;
    left:-150px;
}

.aurora::after{
    background:var(--blue);
    bottom:-150px;
    right:-150px;
    animation-delay:2s;
}

@keyframes drift{
    0%{ transform:translate(0,0) scale(1); }
    100%{ transform:translate(60px,45px) scale(1.15); }
}

/* Header */

header{
    position:relative;
    z-index:2;
    text-align:center;
    padding:clamp(60px,10vw,28px) 20px 28px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--glass-border);
    animation:fade-down .6s cubic-bezier(.2,.8,.2,1) both;
}

@keyframes fade-down{
    from{ opacity:0; transform:translateY(-12px); }
    to{ opacity:1; transform:translateY(0); }
}

header h1{
    font-family:var(--font-display);
    font-weight:800;
    font-size:clamp(1.4rem,5vw,2rem);
    background:linear-gradient(90deg,var(--pink),var(--purple),var(--blue));
    background-size:200% auto;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    animation:shine 4s linear infinite;
}

@keyframes shine{
    to{ background-position:200% center; }
}

/* Back Button */

.back-btn{
    position:fixed;
    top:20px;
    left:20px;
    width:50px;
    height:50px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    font-size:26px;
    color:var(--text);
    background:var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    transition:transform .25s ease, box-shadow .25s ease, background .25s ease;
    z-index:20;
}

.back-btn:hover{
    background:linear-gradient(135deg,var(--pink),var(--purple));
    box-shadow:0 0 25px rgba(255,47,208,.7);
    transform:scale(1.1) rotate(-8deg);
}
.back-btn:active{
    transform:scale(.96);
}
.back-btn:focus-visible,
.levels a:focus-visible{
    outline:2px solid var(--blue);
    outline-offset:3px;
}

/* Main */

.container{
    position:relative;
    z-index:2;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:clamp(30px,6vw,50px) 20px;
}

.card{
    position:relative;
    width:100%;
    max-width:420px;
    background:var(--glass);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid var(--glass-border);
    border-radius:var(--radius-lg);
    padding:clamp(20px,5vw,24px);
    text-align:center;
    box-shadow:0 0 50px rgba(123,47,255,.3);
    transition:transform .4s ease, box-shadow .4s ease;
    animation:card-in .6s .1s cubic-bezier(.2,.8,.2,1) both;
}

@keyframes card-in{
    from{ opacity:0; transform:translateY(18px) scale(.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
}

.card::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:var(--radius-lg);
    padding:2px;
    background:conic-gradient(from 0deg,var(--pink),var(--purple),var(--blue),var(--pink));
    -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
    mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite:exclude;
    opacity:.7;
    animation:spin 1.8s ease-in-out 1 forwards;
    z-index:-1;
}

@keyframes spin{
    0%{ transform:rotate(0deg); opacity:.7; }
    85%{ transform:rotate(360deg); opacity:.7; }
    100%{ transform:rotate(360deg); opacity:0; }
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 70px rgba(123,47,255,.5);
}

.card img{
    width:100%;
    height:clamp(160px,40vw,250px);
    object-fit:cover;
    border-radius:16px;
    filter:brightness(.85);
    transition:filter .4s ease, transform .4s ease;
}

.card:hover img{
    filter:brightness(1);
    transform:scale(1.02);
}

.card h2{
    font-family:var(--font-display);
    margin-top:16px;
    font-size:clamp(1.15rem,3.6vw,1.4rem);
    color:#fff;
}

.card p{
    margin-top:10px;
    color:var(--muted);
    line-height:1.5;
    font-size:clamp(.85rem,2.6vw,.95rem);
}

/* Level Buttons */

.levels{
    margin-top:26px;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.levels a{
    position:relative;
    overflow:hidden;
    text-decoration:none;
    color:white;
    padding:16px;
    min-height:52px;
    border-radius:14px;
    font-size:clamp(15px,3.6vw,17px);
    font-weight:700;
    letter-spacing:.3px;
    transition:transform .2s ease, box-shadow .2s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    box-shadow:0 6px 18px rgba(0,0,0,.35);
    touch-action:manipulation;
}

.levels a::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.35),transparent);
    transition:.5s;
    pointer-events:none;
}

.levels a:hover::after{
    left:100%;
}

.easy{
    background:linear-gradient(135deg,var(--green),#16a34a);
}

.medium{
    background:linear-gradient(135deg,var(--yellow),#eab308);
    color:#1a1a1a !important;
}

.hard{
    background:linear-gradient(135deg,var(--orange),#f97316);
}

.extreme{
    background:linear-gradient(135deg,#f87171,var(--red));
}

.easy:hover{
    transform:scale(1.04) translateY(-2px);
    box-shadow:0 10px 25px rgba(34,197,94,.55);
}

.medium:hover{
    transform:scale(1.04) translateY(-2px);
    box-shadow:0 10px 25px rgba(234,179,8,.55);
}

.hard:hover{
    transform:scale(1.04) translateY(-2px);
    box-shadow:0 10px 25px rgba(249,115,22,.55);
}

.extreme:hover{
    transform:scale(1.04) translateY(-2px);
    box-shadow:0 10px 25px rgba(239,68,68,.55);
}

.levels a:active{
    transform:scale(.97);
}

/* Reduced motion */

@media (prefers-reduced-motion: reduce){
    .aurora::before,
    .aurora::after,
    header,
    header h1,
    .card,
    .card::before{
        animation:none !important;
    }
    *{
        transition:none !important;
    }
}

/* Responsive */

@media(max-width:500px){

    .card{
        padding:18px;
    }

    .card img{
        height:180px;
    }

    header h1{
        font-size:1.4rem;
    }

    .back-btn{
        width:44px;
        height:44px;
        font-size:22px;
        top:14px;
        left:14px;
    }
}

@media(min-width:501px) and (max-width:900px){
    .card{
        max-width:440px;
    }
}

</style>
</head>
<body>

<div class="aurora" aria-hidden="true"></div>

<a href="main.html" class="back-btn" aria-label="Back to home">
    <i class="bi bi-arrow-left" aria-hidden="true"></i>
</a>

<header>
    <h1>🎮 Number Guessing Game</h1>
</header>

<div class="container">

    <div class="card">

        <img src="number.jpeg" alt="Number Guessing Game">

        <h2>Select Difficulty Level</h2>

        <p>
            Choose your level and start guessing the secret number.
            Higher levels give fewer attempts and larger number ranges.
        </p>

        <nav class="levels" aria-label="Difficulty levels">

            <a href="play.html?level=easy" class="easy" data-level="easy">
                🟢 Easy (1 - 50) | 10 Attempts
            </a>

            <a href="play.html?level=medium" class="medium" data-level="medium">
                🟡 Medium (1 - 100) | 7 Attempts
            </a>

            <a href="play.html?level=hard" class="hard" data-level="hard">
                🟠 Hard (1 - 200) | 5 Attempts
            </a>

            <a href="play.html?level=extreme" class="extreme" data-level="extreme">
                🔴 Extreme (1 - 500) | 3 Attempts
            </a>

        </nav>

    </div>

</div>

<script>
    // Difficulty-selection bug fix: navigate using the exact
    // data-level value read from the clicked element itself,
    // instead of relying only on the static href. This guarantees
    // the level that was clicked is the level that gets opened,
    // even if the href were ever out of sync. href is left in
    // place as a working fallback when JavaScript is unavailable.
    document.querySelectorAll(".levels a[data-level]").forEach(function (btn) {
        btn.addEventListener("click", function (event) {
            event.preventDefault();
            const level = this.getAttribute("data-level");
            window.location.href = "play.html?level=" + encodeURIComponent(level);
        });
    });
</script>

</body>
</html>
