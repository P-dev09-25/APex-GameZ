<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Guessing Game</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:#05010f;
    color:white;
    position:relative;
    overflow-x:hidden;
}

/* animated aurora background */

body::before,
body::after{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    border-radius:50%;
    filter:blur(120px);
    opacity:.45;
    z-index:0;
    animation:drift 12s ease-in-out infinite alternate;
    pointer-events:none;
}

body::before{
    background:#ff2fd0;
    top:-150px;
    left:-150px;
}

body::after{
    background:#2fb8ff;
    bottom:-150px;
    right:-150px;
    animation-delay:2s;
}

@keyframes drift{
    0%{ transform:translate(0,0) scale(1); }
    100%{ transform:translate(80px,60px) scale(1.2); }
}

/* Header */

header{
    position:relative;
    z-index:2;
    text-align:center;
    padding:28px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(255,255,255,0.1);
}

header h1{
    font-size:2rem;
    background:linear-gradient(90deg,#ff2fd0,#7b2fff,#2fb8ff);
    background-size:200% auto;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    animation:shine 4s linear infinite;
}

@keyframes shine{
    to{ background-position:200% center; }
}

/* Back Button */

.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    width:50px;
    height:50px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    font-size:26px;
    color:white;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    transition:0.3s;
    z-index:10;
}

.back-btn:hover{
    background:linear-gradient(135deg,#ff2fd0,#7b2fff);
    box-shadow:0 0 25px rgba(255,47,208,.7);
    transform:scale(1.1) rotate(-8deg);
}

/* Main */

.container{
    position:relative;
    z-index:2;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:50px 20px;
}

.card{
    position:relative;
    width:420px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:24px;
    padding:24px;
    text-align:center;
    box-shadow:0 0 50px rgba(123,47,255,.3);
    transition:0.4s;
}

.card::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:24px;
    padding:2px;
    background:conic-gradient(from 0deg,#ff2fd0,#7b2fff,#2fb8ff,#ff2fd0);
    mask-composite:exclude;
    opacity:.7;
    animation:spin 1.6s ease-in-out 1 forwards;
    z-index:-1;
}

@keyframes spin{
    0%{ transform:rotate(0deg); opacity:.7; }
    85%{ transform:rotate(360deg); opacity:.7; }
    100%{ transform:rotate(360deg); opacity:0; }
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 70px rgba(123,47,255,.5);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:16px;
    filter:brightness(.85);
    transition:.4s;
}

.card:hover img{
    filter:brightness(1);
    transform:scale(1.02);
}

.card h2{
    margin-top:16px;
    font-size:1.4rem;
    color:#fff;
}

.card p{
    margin-top:10px;
    color:#cbd5e1;
    line-height:1.5;
    font-size:.95rem;
}

/* Level Buttons */

.levels{
    margin-top:26px;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.levels a{
    position:relative;
    overflow:hidden;
    text-decoration:none;
    color:white;
    padding:16px;
    border-radius:14px;
    font-size:17px;
    font-weight:bold;
    letter-spacing:.3px;
    transition:.3s;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    box-shadow:0 6px 18px rgba(0,0,0,.35);
}

.levels a::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.35),transparent);
    transition:.5s;
}

.levels a:hover::after{
    left:100%;
}

.easy{
    background:linear-gradient(135deg,#22c55e,#16a34a);
}

.medium{
    background:linear-gradient(135deg,#facc15,#eab308);
    color:#1a1a1a !important;
}

.hard{
    background:linear-gradient(135deg,#fb923c,#f97316);
}

.extreme{
    background:linear-gradient(135deg,#f87171,#ef4444);
}

.easy:hover{
    transform:scale(1.05) translateY(-2px);
    box-shadow:0 10px 25px rgba(34,197,94,.55);
}

.medium:hover{
    transform:scale(1.05) translateY(-2px);
    box-shadow:0 10px 25px rgba(234,179,8,.55);
}

.hard:hover{
    transform:scale(1.05) translateY(-2px);
    box-shadow:0 10px 25px rgba(249,115,22,.55);
}

.extreme:hover{
    transform:scale(1.05) translateY(-2px);
    box-shadow:0 10px 25px rgba(239,68,68,.55);
}

/* Responsive */

@media(max-width:500px){

    .card{
        width:95%;
        padding:18px;
    }

    .card img{
        height:200px;
    }

    header h1{
        font-size:1.5rem;
    }
}

</style>
</head>
<body>

<a href="main.html" class="back-btn">
    <i class="bi bi-arrow-left"></i>
</a>

<header>
    <h1>🎮 Number Guessing Game</h1>
</header>

<div class="container">

    <div class="card">

        <img src="number.jpeg" alt="Number Guessing Game">

        <h2>Select Difficulty Level</h2>

        <p>
            Choose your level and start guessing the secret number.
            Higher levels give fewer attempts and larger number ranges.
        </p>

        <div class="levels">

            <a href="play.html?level=easy" class="easy">
                🟢 Easy (1 - 50) | 10 Attempts
            </a>

            <a href="play.html?level=medium" class="medium">
                🟡 Medium (1 - 100) | 7 Attempts
            </a>

            <a href="play.html?level=hard" class="hard">
                🟠 Hard (1 - 200) | 5 Attempts
            </a>

            <a href="play.html?level=extreme" class="extreme">
                🔴 Extreme (1 - 500) | 3 Attempts
            </a>

        </div>

    </div>

</div>

</body>
</html>
