<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Number Guessing Game</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

:root{
    --bg:#05010f;
    --pink:#ff2fd0;
    --purple:#7b2fff;
    --blue:#2fb8ff;
    --green:#22c55e;
    --yellow:#facc15;
    --orange:#f97316;
    --red:#ef4444;
    --text:#ffffff;
    --muted:#94a3b8;
    --glass:rgba(255,255,255,0.06);
    --glass-border:rgba(255,255,255,0.12);
    --radius-lg:28px;
    --radius-md:16px;
    --font-display:'Sora','Segoe UI',sans-serif;
    --font-body:'Segoe UI',system-ui,sans-serif;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:var(--font-body);
    -webkit-tap-highlight-color:transparent;
}

html{
    -webkit-text-size-adjust:100%;
}

body{
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:var(--bg);
    color:var(--text);
    position:relative;
    overflow-x:hidden;
    padding:20px;
}

/* animated aurora background */

.aurora{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
    pointer-events:none;
}

.aurora::before,
.aurora::after{
    content:"";
    position:absolute;
    width:min(600px,80vw);
    height:min(600px,80vw);
    border-radius:50%;
    filter:blur(120px);
    opacity:.5;
    animation:drift 12s ease-in-out infinite alternate;
}

.aurora::before{
    background:var(--pink);
    top:-150px;
    left:-150px;
}

.aurora::after{
    background:var(--blue);
    bottom:-150px;
    right:-150px;
    animation-delay:2s;
}

@keyframes drift{
    0%{ transform:translate(0,0) scale(1); }
    100%{ transform:translate(60px,45px) scale(1.15); }
}

/* Back Button */

.back-btn{
    position:fixed;
    top:20px;
    left:20px;
    width:52px;
    height:52px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    color:var(--text);
    font-size:26px;
    background:var(--glass);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid var(--glass-border);
    transition:transform .25s ease, box-shadow .25s ease, background .25s ease;
    z-index:20;
}
.back-btn:hover{
    background:linear-gradient(135deg,var(--pink),var(--purple));
    box-shadow:0 0 25px rgba(255,47,208,.7);
    transform:scale(1.08) rotate(-8deg);
}
.back-btn:active{
    transform:scale(.96);
}

/* Sound Toggle */

.sound-btn{
    position:fixed;
    top:20px;
    right:20px;
    width:52px;
    height:52px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:var(--text);
    font-size:21px;
    background:var(--glass);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid var(--glass-border);
    transition:transform .25s ease, box-shadow .25s ease, background .25s ease;
    z-index:20;
    cursor:pointer;
}

.sound-btn:hover{
    background:linear-gradient(135deg,var(--purple),var(--blue));
    box-shadow:0 0 25px rgba(47,184,255,.7);
    transform:scale(1.08);
}
.sound-btn:active{
    transform:scale(.96);
}

.back-btn:focus-visible,
.sound-btn:focus-visible,
.guess-btn:focus-visible,
.restart-btn:focus-visible,
#guessInput:focus-visible{
    outline:2px solid var(--blue);
    outline-offset:3px;
}

/* Game Box */

.game-box{
    position:relative;
    z-index:1;
    width:100%;
    max-width:440px;
    padding:clamp(24px,6vw,35px) clamp(20px,5vw,30px);
    text-align:center;
    border-radius:var(--radius-lg);
    background:var(--glass);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);
    box-shadow:0 0 60px rgba(123,47,255,.32);
    transition:transform .4s ease, box-shadow .4s ease;
    animation:box-in .55s cubic-bezier(.2,.8,.2,1) both;
}

@keyframes box-in{
    from{ opacity:0; transform:translateY(22px) scale(.97); }
    to{ opacity:1; transform:translateY(0) scale(1); }
}

.game-box::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:var(--radius-lg);
    padding:2px;
    background:conic-gradient(from 0deg,var(--pink),var(--purple),var(--blue),var(--pink));
    -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
    mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite:exclude;
    opacity:.7;
    animation:spin 1.8s ease-in-out 1 forwards;
    z-index:-1;
}

@keyframes spin{
    0%{ transform:rotate(0deg); opacity:.7; }
    85%{ transform:rotate(360deg); opacity:.7; }
    100%{ transform:rotate(360deg); opacity:0; }
}

.game-box:hover{
    transform:translateY(-4px);
    box-shadow:0 0 80px rgba(123,47,255,.5);
}

h1{
    font-family:var(--font-display);
    font-weight:800;
    font-size:clamp(1.5rem,5vw,1.85rem);
    margin-bottom:14px;
    background:linear-gradient(90deg,var(--pink),var(--purple),var(--blue));
    background-size:200% auto;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    animation:shine 4s linear infinite;
}

@keyframes shine{
    to{ background-position:200% center; }
}

#levelName{
    display:inline-block;
    color:#ffe066;
    margin-bottom:14px;
    padding:6px 18px;
    border-radius:30px;
    background:rgba(255,224,102,0.1);
    border:1px solid rgba(255,224,102,0.35);
    font-size:clamp(.85rem,2.6vw,1rem);
    letter-spacing:.5px;
    font-weight:600;
}

.info{
    color:var(--muted);
    margin-bottom:20px;
    line-height:1.5;
    font-size:clamp(.85rem,2.6vw,.95rem);
}

/* Input */

#guessInput{
    width:100%;
    padding:16px;
    border:2px solid var(--glass-border);
    border-radius:14px;
    text-align:center;
    font-size:22px;
    font-weight:700;
    outline:none;
    background:rgba(255,255,255,0.06);
    color:var(--text);
    transition:border-color .3s ease, box-shadow .3s ease, background .3s ease;
}

#guessInput::placeholder{
    color:rgba(255,255,255,0.4);
    font-weight:500;
}

#guessInput:focus{
    border-color:var(--blue);
    box-shadow:0 0 20px rgba(47,184,255,.55);
    background:rgba(255,255,255,0.1);
}

#guessInput.shake{
    animation:shake .4s;
    border-color:var(--red);
}

@keyframes shake{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-8px); }
    40%{ transform:translateX(8px); }
    60%{ transform:translateX(-6px); }
    80%{ transform:translateX(6px); }
}

/* Guess Button */

.guess-btn{
    width:100%;
    margin-top:16px;
    padding:16px;
    min-height:52px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,var(--purple),var(--blue));
    color:var(--text);
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    transition:transform .2s ease, box-shadow .2s ease, filter .2s ease;
    box-shadow:0 8px 20px rgba(123,47,255,.4);
    letter-spacing:.5px;
    touch-action:manipulation;
}

.guess-btn:hover{
    transform:scale(1.02) translateY(-2px);
    box-shadow:0 10px 30px rgba(47,184,255,.6);
    filter:brightness(1.1);
}

.guess-btn:active{
    transform:scale(.97);
}

/* Message */

#message{
    margin-top:20px;
    font-size:clamp(1.05rem,4vw,1.35rem);
    font-weight:700;
    min-height:32px;
    transition:color .3s ease;
    color:var(--muted);
}

#message.pop{
    animation:pop .35s ease;
}

@keyframes pop{
    0%{ transform:scale(.85); opacity:.3; }
    60%{ transform:scale(1.08); opacity:1; }
    100%{ transform:scale(1); }
}

/* Attempts */

#attempts{
    margin-top:10px;
    color:#ffe066;
    font-size:clamp(.85rem,2.8vw,1rem);
    letter-spacing:.5px;
    font-weight:600;
}

/* Progress Bar (attempts remaining) */

.progress-wrap{
    margin-top:14px;
    width:100%;
    height:8px;
    border-radius:10px;
    background:rgba(255,255,255,0.1);
    overflow:hidden;
}

#progressBar{
    height:100%;
    width:100%;
    border-radius:10px;
    background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));
    transition:width .4s ease;
}

/* Guess History */

.history-wrap{
    margin-top:20px;
    text-align:left;
}

.history-title{
    font-size:12px;
    color:var(--muted);
    letter-spacing:.6px;
    margin-bottom:8px;
    text-transform:uppercase;
    font-weight:700;
}

#historyList{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    max-height:110px;
    overflow-y:auto;
    padding-right:4px;
}

#historyList::-webkit-scrollbar{
    width:5px;
}

#historyList::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,.2);
    border-radius:10px;
}

.chip{
    padding:7px 12px;
    border-radius:20px;
    font-size:13.5px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:5px;
    animation:chipIn .3s ease;
    white-space:nowrap;
}

@keyframes chipIn{
    0%{ transform:scale(.5); opacity:0; }
    100%{ transform:scale(1); opacity:1; }
}

.chip.low{
    background:rgba(56,189,248,0.18);
    color:#38bdf8;
    border:1px solid rgba(56,189,248,.4);
}

.chip.high{
    background:rgba(239,68,68,0.18);
    color:var(--red);
    border:1px solid rgba(239,68,68,.4);
}

.chip.correct{
    background:rgba(34,197,94,0.2);
    color:var(--green);
    border:1px solid rgba(34,197,94,.5);
}

/* Restart Button */

.restart-btn{
    display:none;
    width:100%;
    margin-top:22px;
    padding:16px;
    min-height:52px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,var(--green),#0ea5e9);
    color:var(--text);
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    transition:transform .2s ease, box-shadow .2s ease, filter .2s ease;
    box-shadow:0 8px 20px rgba(34,197,94,.4);
    touch-action:manipulation;
}

.restart-btn:hover{
    transform:scale(1.02) translateY(-2px);
    box-shadow:0 10px 30px rgba(34,197,94,.6);
    filter:brightness(1.1);
}
.restart-btn:active{
    transform:scale(.97);
}

/* Confetti */

.confetti{
    position:fixed;
    top:-10px;
    width:8px;
    height:14px;
    z-index:999;
    pointer-events:none;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(600deg);
        opacity:.9;
    }
}

/* Fireworks */

.firework-burst{
    position:fixed;
    width:0;
    height:0;
    z-index:998;
    pointer-events:none;
}

.firework-burst span{
    position:absolute;
    top:0;
    left:0;
    width:4px;
    height:4px;
    border-radius:50%;
    transform:rotate(var(--fw-angle)) translateY(0);
    opacity:1;
    animation:fw-spark .9s ease-out forwards;
    box-shadow:0 0 8px currentColor;
}

@keyframes fw-spark{
    0%{
        transform:rotate(var(--fw-angle)) translateY(0);
        opacity:1;
    }
    100%{
        transform:rotate(var(--fw-angle)) translateY(-80px);
        opacity:0;
    }
}

/* Reduced motion */

@media (prefers-reduced-motion: reduce){
    .aurora::before,
    .aurora::after,
    h1,
    .game-box,
    .game-box::before,
    #message.pop,
    .chip,
    #guessInput.shake{
        animation:none !important;
    }
    *{
        transition:none !important;
    }
}

/* Mobile */

@media(max-width:500px){

    body{
        padding:16px;
        align-items:flex-start;
        padding-top:88px;
    }

    .game-box{
        max-width:100%;
        padding:24px 18px;
    }

    .back-btn,
    .sound-btn{
        width:46px;
        height:46px;
        font-size:22px;
        top:16px;
    }

    .back-btn{ left:16px; }
    .sound-btn{ right:16px; }
}

@media(min-width:501px) and (max-width:900px){
    .game-box{
        max-width:460px;
    }
}

</style>
</head>

<body>

<div class="aurora" aria-hidden="true"></div>

<!-- Back Arrow -->

<a href="number.html" class="back-btn" aria-label="Back to home">
    <i class="bi bi-arrow-left" aria-hidden="true"></i>
</a>

<!-- Sound Toggle -->

<div class="sound-btn" id="soundToggle" role="button" tabindex="0" aria-pressed="true" aria-label="Toggle sound" onclick="toggleSound()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleSound();}">
    <i class="bi bi-volume-up-fill" id="soundIcon" aria-hidden="true"></i>
</div>

<!-- Game Container -->

<main class="game-box">

    <h1>🎮 Number Guessing Game</h1>

    <h3 id="levelName">
        Loading Level...
    </h3>

    <p class="info">
        Guess the secret number before your attempts run out.
    </p>

    <label for="guessInput" class="ttt-sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Enter your guess</label>
    <input
        type="number"
        id="guessInput"
        placeholder="Enter Number"
        inputmode="numeric"
        autocomplete="off">

    <button
        class="guess-btn"
        onclick="checkGuess()">
        🎯 Guess Number
    </button>

    <p id="message" aria-live="polite">🎯 Start Guessing!</p>

    <p id="attempts" aria-live="polite">
        Attempts Left: 0
    </p>

    <div class="progress-wrap" role="progressbar" aria-label="Attempts remaining" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100">
        <div id="progressBar"></div>
    </div>

    <div class="history-wrap">
        <div class="history-title">Previous Guesses</div>
        <div id="historyList"></div>
    </div>

    <button
        id="restartBtn"
        class="restart-btn"
        onclick="location.reload()">
        🔄 Play Again
    </button>

</main>

<script src="number_guess.js"></script>

</body>
</html>
