<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Number Guessing Game</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#05010f;
    color:white;
    position:relative;
    overflow:hidden;
}

/* animated aurora background */

body::before,
body::after{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    border-radius:50%;
    filter:blur(120px);
    opacity:.55;
    z-index:0;
    animation:drift 12s ease-in-out infinite alternate;
}

body::before{
    background:#ff2fd0;
    top:-150px;
    left:-150px;
}

body::after{
    background:#2fb8ff;
    bottom:-150px;
    right:-150px;
    animation-delay:2s;
}

@keyframes drift{
    0%{ transform:translate(0,0) scale(1); }
    100%{ transform:translate(80px,60px) scale(1.2); }
}

/* Back Button */

.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    color:white;
    font-size:28px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.15);
    transition:0.3s;
    z-index:10;
}
.back-btn:hover{
    background:linear-gradient(135deg,#ff2fd0,#7b2fff);
    box-shadow:0 0 25px rgba(255,47,208,.7);
    transform:scale(1.1) rotate(-8deg);
}

/* Game Box */

.game-box{
    position:relative;
    width:450px;
    padding:35px 30px;
    text-align:center;
    border-radius:28px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 0 60px rgba(123,47,255,.35);
    z-index:1;
    transition:.4s;
}

.game-box::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:28px;
    padding:2px;
    background:conic-gradient(from 0deg,#ff2fd0,#7b2fff,#2fb8ff,#ff2fd0);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    opacity:.7;
    animation:spin 1.6s ease-in-out 1 forwards;
    z-index:-1;
}

@keyframes spin{
    0%{ transform:rotate(0deg); opacity:.7; }
    85%{ transform:rotate(360deg); opacity:.7; }
    100%{ transform:rotate(360deg); opacity:0; }
}

.game-box:hover{
    transform:translateY(-6px);
    box-shadow:0 0 80px rgba(123,47,255,.55);
}

h1{
    font-size:1.8rem;
    margin-bottom:15px;
    background:linear-gradient(90deg,#ff2fd0,#7b2fff,#2fb8ff);
    background-size:200% auto;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    animation:shine 4s linear infinite;
}

@keyframes shine{
    to{ background-position:200% center; }
}

#levelName{
    display:inline-block;
    color:#ffe066;
    margin-bottom:15px;
    padding:6px 18px;
    border-radius:30px;
    background:rgba(255,224,102,0.1);
    border:1px solid rgba(255,224,102,0.35);
    font-size:1rem;
    letter-spacing:.5px;
}

.info{
    color:#cbd5e1;
    margin-bottom:22px;
    line-height:1.5;
    font-size:.95rem;
}

/* Input */

#guessInput{
    width:100%;
    padding:16px;
    border:2px solid rgba(255,255,255,0.15);
    border-radius:14px;
    text-align:center;
    font-size:22px;
    font-weight:600;
    outline:none;
    background:rgba(255,255,255,0.06);
    color:white;
    transition:.3s;
}

#guessInput::placeholder{
    color:rgba(255,255,255,0.4);
}

#guessInput:focus{
    border-color:#2fb8ff;
    box-shadow:0 0 20px rgba(47,184,255,.6);
    background:rgba(255,255,255,0.1);
}

/* Guess Button */

.guess-btn{
    width:100%;
    margin-top:16px;
    padding:16px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#7b2fff,#2fb8ff);
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 8px 20px rgba(123,47,255,.4);
    letter-spacing:.5px;
}

.guess-btn:hover{
    transform:scale(1.03) translateY(-2px);
    box-shadow:0 10px 30px rgba(47,184,255,.6);
    filter:brightness(1.1);
}

.guess-btn:active{
    transform:scale(.97);
}

/* Message */

#message{
    margin-top:22px;
    font-size:22px;
    font-weight:bold;
    min-height:30px;
    transition:.3s;
}

/* Attempts */

#attempts{
    margin-top:12px;
    color:#ffe066;
    font-size:16px;
    letter-spacing:.5px;
}

/* Restart Button */

.restart-btn{
    display:none;
    width:100%;
    margin-top:22px;
    padding:16px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#22c55e,#0ea5e9);
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 8px 20px rgba(34,197,94,.4);
}

.restart-btn:hover{
    transform:scale(1.03) translateY(-2px);
    box-shadow:0 10px 30px rgba(34,197,94,.6);
    filter:brightness(1.1);
}

/* Mobile */

@media(max-width:500px){

    .game-box{
        width:90%;
        padding:28px 20px;
    }

    .back-btn{
        width:50px;
        height:50px;
        font-size:24px;
    }

    h1{
        font-size:1.5rem;
    }
}

</style>
</head>

<body>

<!-- Back Arrow -->

<a href="number.html" class="back-btn">
    <i class="bi bi-arrow-left"></i>
</a>

<!-- Game Container -->

<div class="game-box">

    <h1>🎮 Number Guessing Game</h1>

    <h3 id="levelName">
        Loading Level...
    </h3>

    <p class="info">
        Guess the secret number before your attempts run out.
    </p>

    <input
        type="number"
        id="guessInput"
        placeholder="Enter Number">

    <button
        class="guess-btn"
        onclick="checkGuess()">
        🎯 Guess Number
    </button>

    <p id="message"></p>

    <p id="attempts">
        Attempts Left: 0
    </p>

    <button
        id="restartBtn"
        class="restart-btn"
        onclick="location.reload()">
        🔄 Play Again
    </button>

</div>

<script src="number_guess.js"></script>

</body>
</html>
