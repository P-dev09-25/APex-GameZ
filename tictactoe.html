<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Tic-Tac-Toe</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap"
  rel="stylesheet"
/>
<link rel="stylesheet" href="tictactoe.css" />
</head>
<body class="ttt-page">

<!-- Ambient decoration — purely visual, sits behind everything -->
<div class="ttt-glow" aria-hidden="true"></div>
<div class="ttt-ambient" aria-hidden="true">
  <span>X</span>
  <span>O</span>
  <span>X</span>
  <span>O</span>
</div>

<header class="ttt-page-header">
  <!-- Update href to point at your project's home page -->
  <a class="ttt-home-btn" href="/" aria-label="Back to home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    Back to Home
  </a>
</header>

<div class="ttt-hero">
  <h1>Tic &middot; Tac &middot; Toe</h1>
  <p>Three in a row wins</p>
</div>

<!-- ============================================================
     Embeddable widget — copy this whole <div id="ttt-widget"> block
     into any page, alongside tictactoe.css / tictactoe.js /
     celebration.js / tictactoe.wasm. Class names and structure are
     unchanged from the original so the game engine keeps working.
     ============================================================ -->
<div class="ttt-widget" id="ttt-widget">

  <div class="ttt-header">
    <p class="ttt-title">Tic&nbsp;&middot;&nbsp;Tac&nbsp;&middot;&nbsp;Toe</p>
    <div class="ttt-score" aria-live="polite"></div>
  </div>

  <div class="ttt-mode" role="group" aria-label="Game mode">
    <button type="button" data-mode="1" class="is-active">Vs&nbsp;Computer</button>
    <button type="button" data-mode="0">Two&nbsp;Players</button>
  </div>

  <div class="ttt-status" aria-live="polite"></div>

  <div class="ttt-board" role="grid" aria-label="Tic-tac-toe board">
    <button type="button" class="ttt-cell" data-index="0" aria-label="Empty cell 1"></button>
    <button type="button" class="ttt-cell" data-index="1" aria-label="Empty cell 2"></button>
    <button type="button" class="ttt-cell" data-index="2" aria-label="Empty cell 3"></button>
    <button type="button" class="ttt-cell" data-index="3" aria-label="Empty cell 4"></button>
    <button type="button" class="ttt-cell" data-index="4" aria-label="Empty cell 5"></button>
    <button type="button" class="ttt-cell" data-index="5" aria-label="Empty cell 6"></button>
    <button type="button" class="ttt-cell" data-index="6" aria-label="Empty cell 7"></button>
    <button type="button" class="ttt-cell" data-index="7" aria-label="Empty cell 8"></button>
    <button type="button" class="ttt-cell" data-index="8" aria-label="Empty cell 9"></button>
  </div>

  <div class="ttt-footer">
    <button type="button" class="ttt-restart">Restart</button>
  </div>

</div>

<script src="tictactoe.js"></script>
<script src="celebration.js"></script>
</body>
</html>
